# netlify.toml — Applianzo deployment config
# Place this file in the ROOT of your GitHub repository

[build]
  # No build step needed — pure static HTML files
  publish = "."

[build.environment]
  NODE_VERSION = "18"

# Security & performance headers for all pages
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Cache-Control = "public, max-age=0, must-revalidate"

# Cache static assets aggressively (images, fonts)
[[headers]]
  for = "*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Redirect rules (mirrors _redirects file — netlify.toml takes precedence)
[[redirects]]
  from = "/"
  to = "/applianzo-splash.html"
  status = 200

[[redirects]]
  from = "/login"
  to = "/applianzo-login.html"
  status = 200

[[redirects]]
  from = "/signup"
  to = "/applianzo-login.html"
  status = 200

[[redirects]]
  from = "/profile"
  to = "/applianzo-profile.html"
  status = 200

[[redirects]]
  from = "/admin"
  to = "/applianzo-admin.html"
  status = 200

[[redirects]]
  from = "/splash"
  to = "/applianzo-splash.html"
  status = 200

# Catch-all — unknown URLs go to main site
[[redirects]]
  from = "/*"
  to = "/applianzo.html"
  status = 404
